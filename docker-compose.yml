services:
  postgres:
    image: postgres:17
    container_name: shoe-store-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - shoe_store_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - shoe_store_network

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: shoe-store-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

    ports:
      - "${PGADMIN_PORT:-5050}:80"

    volumes:
      - shoe_store_pgadmin_data:/var/lib/pgadmin

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - shoe_store_network

volumes:
  shoe_store_postgres_data:
    name: shoe-store-postgres-data

  shoe_store_pgadmin_data:
    name: shoe-store-pgadmin-data

networks:
  shoe_store_network:
    name: shoe-store-network
    driver: bridge

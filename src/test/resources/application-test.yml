spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/shoe_store_test}
    username: ${TEST_DB_USERNAME:shoe_store}
    password: ${TEST_DB_PASSWORD:ShoeStore@2026}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
      - classpath:db/test-migration
    validate-on-migrate: true
    clean-disabled: true
